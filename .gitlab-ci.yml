stages:
  - .pre
  - build
  - test
  - deploy
  - review
  - dast
  - staging
  - tenants-staging
  - tenants-prod
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - release
  - performance
  - cleanup
  - .post

otgcargo-staging:
  extends: staging
  stage: tenants-staging
  before_script:
    - |
      while IFS= read -r line || [ -n "$line" ]; do
        if [[ ! $line =~ ^# && $line =~ = ]]; then
          eval "export $line"
        fi
      done < <(cat "$OTGCARGO_STAGING_ENV")
    - export HELM_UPGRADE_VALUES_FILE=".gitlab/otgcargo-auto-deploy-values.yaml"
  cache: []
  environment:
    name: otgcargo-staging
    url: $OTGCARGO_STAGING_ADDITIONAL_HOSTS
  rules:
    - if: $OTGCARGO_STAGING_ADDITIONAL_HOSTS == null
      when: never
    - if: ($CI_KUBERNETES_ACTIVE == null || $CI_KUBERNETES_ACTIVE == "") && ($KUBECONFIG == null || $KUBECONFIG == "")
      when: never
    - if: "$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH"
      when: never
    - if: "$OTGCARGO_STAGING_ENABLED"
      when: manual

otgcargo-prod:
  extends: production
  stage: tenants-prod
  needs:
    - job: build
    - job: otgcargo-staging
  artifacts: 
    paths: []
  before_script:
    - |
      while IFS= read -r line || [ -n "$line" ]; do
        if [[ ! $line =~ ^# && $line =~ = ]]; then
          eval "export $line"
        fi
      done < <(cat "$OTGCARGO_PROD_ENV")
    - export HELM_UPGRADE_VALUES_FILE=".gitlab/otgcargo-prod-auto-deploy-values.yaml"
  cache: []
  environment:
    name: otgcargo-prod
    url: $OTGCARGO_PROD_ADDITIONAL_HOSTS
  rules:
    - if: $OTGCARGO_PROD_ADDITIONAL_HOSTS == null
      when: never
    - if: ($CI_KUBERNETES_ACTIVE == null || $CI_KUBERNETES_ACTIVE == "") && ($KUBECONFIG == null || $KUBECONFIG == "")
      when: never
    - if: "$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH"
      when: never
    - if: "$OTGCARGO_PROD_ENABLED"
      when: manual

