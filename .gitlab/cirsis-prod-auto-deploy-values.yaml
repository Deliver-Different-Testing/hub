replicaCount: 2
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
ingress:
  tls:
    enabled: true
  annotations:
    kubernetes.io/tls-acme: 'true'
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/client-body-buffer-size: 32m
  modSecurity:
    enabled: false
    secRuleEngine: DetectionOnly
livenessProbe:
  path: /healthz
  initialDelaySeconds: 25
  timeoutSeconds: 15
  scheme: HTTP
  probeType: httpGet
readinessProbe:
  path: /healthz
  initialDelaySeconds: 30
  timeoutSeconds: 3
  scheme: HTTP
  probeType: httpGet
service:
  externalPort: 5000
  internalPort: 8080
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
extraLabels:
  tenant: cirsis
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: tenant
              operator: In
              values:
                - cirsis
tolerations:
  - key: tenant
    operator: Equal
    value: cirsis
    effect: NoSchedule
